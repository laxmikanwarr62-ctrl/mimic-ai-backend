<script>
    const BACKEND_URL = '/api';

    let attachedBase64 = null;
    let attachedMimeType = null;

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        attachedMimeType = file.type;
        const reader = new FileReader();

        reader.onload = function(e) {
            attachedBase64 = e.target.result.split(',')[1];

            document.getElementById('previewContainer').style.display = 'flex';
            document.getElementById('fileName').innerText = file.name;

            if (file.type.startsWith('image/')) {
                document.getElementById('filePreview').src = e.target.result;
                document.getElementById('filePreview').style.display = 'block';
            } else {
                document.getElementById('filePreview').style.display = 'none';
            }
        };

        reader.readAsDataURL(file);
    }

    function clearFile() {
        attachedBase64 = null;
        attachedMimeType = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('previewContainer').style.display = 'none';
    }

    async function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const text = inputEl.value.trim();

        if (!text && !attachedBase64) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.innerText = text || "Sent an attachment file.";
        chatBox.appendChild(userDiv);

        inputEl.value = '';

        const sendData = { message: text, fileData: attachedBase64, mimeType: attachedMimeType };
        clearFile();

        chatBox.scrollTop = chatBox.scrollHeight;

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-message';
        loadingDiv.innerText = 'Mimic processing core compiling response...';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sendData)
            });

            const data = await response.json();
            loadingDiv.innerText = data.reply || data.error || 'Core error processing request matrix.';
        } catch (error) {
            loadingDiv.innerText = "Unable to establish interface bridge link to Vercel Core system.";
            console.error(error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
