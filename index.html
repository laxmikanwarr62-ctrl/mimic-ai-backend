<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic.AI</title>
    <style>
        * {
            box-sizing: border-border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background-color: #121212;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        .chat-header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #222;
            text-align: center;
            background-color: #161616;
            letter-spacing: 1px;
        }

        .chat-header span {
            color: #ff4d4d;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #ff4d4d;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: #222;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }

        .preview-container {
            padding: 10px 20px;
            background-color: #161616;
            border-top: 1px solid #222;
            display: none;
            align-items: center;
            gap: 15px;
        }

        .preview-container img {
            max-height: 80px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .preview-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .preview-info span {
            font-size: 13px;
        }

        .input-wrapper {
            padding: 20px;
            background-color: #161616;
            border-top: 1px solid #222;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .upload-label {
            cursor: pointer;
            padding: 12px;
            background-color: #222;
            border-radius: 8px;
            border: 1px solid #333;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-label:hover {
            background-color: #2a2a2a;
        }

        .upload-label svg {
            width: 20px;
            height: 20px;
            fill: #aaa;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ff4d4d;
        }

        .premium-matte-btn {
            background: linear-gradient(145deg, #ff4d4d, #cc0000);
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.2);
            transition: all 0.3s ease;
        }

        .premium-matte-btn:hover {
            background: linear-gradient(145deg, #ff6666, #e60000);
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.3);
            transform: translateY(-1px);
        }

        .premium-matte-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">MIMIC<span>.AI</span></div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Mimic Universal Core online. Visual analysis registers and real-time telemetry protocols are fully operational. Upload any image, video, or ask any question.</div>
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="filePreview" src="" alt="Preview">
            <div class="preview-info">
                <span id="fileName" style="font-size: 12px; color: #aaa;"></span>
                <button onclick="clearFile()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; margin-left:auto; font-size:12px;">Remove</button>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-row">
                <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" onchange="handleFileSelect(event)">
                <label for="fileInput" class="upload-label" title="Upload Image or Video">
                    <svg viewBox="0 0 24 24">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-2.76 2.24-5 5-5s5 2.24 5 5v12c0 3.31-2.69 6-6 6s-6-2.69-6-6V6h2v11c0 2.21 1.79 4 4 4s4-1.79 4-4V5c0-1.66-1.34-3-3-3s-3 1.34-3 3v12c0 .55.45 1 1 1s1-.45 1-1V6h2z"/>
                    </svg>
                </label>
                
                <input type="text" id="userInput" placeholder="Ask anything, analyze media, or explore imaginations...">
                <button class="premium-matte-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = '/api';

        let attachedBase64 = null;
        let attachedMimeType = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            attachedMimeType = file.type;
            const reader = new FileReader();

            reader.onload = function(e) {
                attachedBase64 = e.target.result.split(',')[1];

                document.getElementById('previewContainer').style.display = 'flex';
                document.getElementById('fileName').innerText = file.name;

                if (file.type.startsWith('image/')) {
                    document.getElementById('filePreview').src = e.target.result;
                    document.getElementById('filePreview').style.display = 'block';
                } else {
                    document.getElementById('filePreview').style.display = 'none';
                }
            };

            reader.readAsDataURL(file);
        }

        function clearFile() {
            attachedBase64 = null;
            attachedMimeType = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewContainer').style.display = 'none';
        }

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = inputEl.value.trim();

            if (!text && !attachedBase64) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerText = text || "Sent an attachment file.";
            chatBox.appendChild(userDiv);

            inputEl.value = '';

            const sendData = { message: text, fileData: attachedBase64, mimeType: attachedMimeType };
            clearFile();

            chatBox.scrollTop = chatBox.scrollHeight;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.innerText = 'Mimic processing core compiling response...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sendData)
                });

                const data = await response.json();
                loadingDiv.innerText = data.reply || data.error || 'Core error processing request matrix.';
            } catch (error) {
                loadingDiv.innerText = "Unable to establish interface bridge link to Vercel Core system.";
                console.error(error);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
