<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimic.AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0b0b;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 15px;
    }

    .chat-header {
      text-align: center;
      padding: 15px 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ffffff;
      border-bottom: 1px solid #1a1a1a;
    }

    .chat-header span {
      color: #a5a5a5;
      font-weight: 300;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 75%;
      padding: 14px 20px;
      border-radius: 22px;
      line-height: 1.6;
      font-size: 15px;
      word-wrap: break-word;
    }

    .user-message {
      background-color: #1a1a1a;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .ai-message {
      background: linear-gradient(145deg, #141414, #1e1e1e);
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #222;
    }

    .preview-container {
      display: none;
      padding: 10px;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      margin-bottom: 10px;
      align-items: center;
      gap: 10px;
    }

    .preview-container img {
      max-height: 60px;
      border-radius: 5px;
    }

    .input-wrapper {
      display: flex;
      flex-direction: column;
      background-color: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 25px;
      padding: 8px 15px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 16px;
      outline: none;
      padding: 10px;
    }

    .upload-label {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      color: #a5a5a5;
      transition: color 0.2s;
    }

    .upload-label:hover {
      color: #ffffff;
    }

    .premium-matte-btn {
      background: linear-gradient(145deg, #1e1e1e, #141414);
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      padding: 10px 25px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 2px 2px 8px #050505, -2px -2px 8px #1f1f1f;
      transition: all 0.3s ease;
    }

    .premium-matte-btn:hover {
      background: linear-gradient(145deg, #141414, #1e1e1e);
      color: #ffffff;
      box-shadow: 1px 1px 4px #050505, -1px -1px 4px #1f1f1f;
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">MIMIC<span>.AI</span></div>
    
    <div class="chat-box" id="chatBox">
      <div class="message ai-message">Mimic Universal Core online. Visual analysis registers and real-time telemetry protocols are fully operational. Upload any image, video, or ask any question.</div>
    </div>

    <div class="preview-container" id="previewContainer">
      <img id="filePreview" src="" alt="Preview">
      <span id="fileName" style="font-size: 12px; color: #aaa;"></span>
      <button onclick="clearFile()" style="background:none; border:none; color:#ff4a4a; cursor:pointer; margin-left:auto;">✕</button>
    </div>

    <div class="input-wrapper">
      <div class="input-row">
        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" onchange="handleFileSelect(event)">
        <label for="fileInput" class="upload-label" title="Upload Image or Video">
          📎
        </label>
        
        <input type="text" id="userInput" placeholder="Ask anything, analyze media, or explore imaginations...">
        <button class="premium-matte-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://mimic-ai-backend.vercel.app/api';

    let attachedBase64 = null;
    let attachedMimeType = null;

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      attachedMimeType = file.type;
      const reader = new FileReader();
      
      reader.onload = function(e) {
        attachedBase64 = e.target.result.split(',')[1];
        
        document.getElementById('previewContainer').style.display = 'flex';
        document.getElementById('fileName').innerText = file.name;
        
        if (file.type.startsWith('image/')) {
          document.getElementById('filePreview').src = e.target.result;
          document.getElementById('filePreview').style.display = 'block';
        } else {
          document.getElementById('filePreview').style.display = 'none';
        }
      };
      
      reader.readAsDataURL(file);
    }

    function clearFile() {
      attachedBase64 = null;
      attachedMimeType = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('previewContainer').style.display = 'none';
    }

    async function sendMessage() {
      const inputEl = document.getElementById('userInput');
      const chatBox = document.getElementById('chatBox');
      const text = inputEl.value.trim();

      if (!text && !attachedBase64) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user-message';
      userDiv.innerText = text || "Sent an attachment file.";
      chatBox.appendChild(userDiv);
      
      inputEl.value = '';
      const sendData = { message: text, fileData: attachedBase64, mimeType: attachedMimeType };
      clearFile();
      
      chatBox.scrollTop = chatBox.scrollHeight;

      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message ai-message';
      loadingDiv.innerText = 'Mimic processing core compiling response...';
      chatBox.appendChild(loadingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sendData)
        });
        
        const data = await response.json();
        loadingDiv.innerText = data.reply || data.error || 'Core error processing request matrix.';
      } catch (error) {
        loadingDiv.innerText = 'Unable to establish interface bridge link to Vercel Core system.';
        console.error(error);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
  </html>
